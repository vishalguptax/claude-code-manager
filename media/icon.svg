<svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Back card (stacked session) -->
  <rect x="7" y="3" width="18" height="14" rx="2.5" stroke="#C5C5C5" stroke-width="1.5" opacity="0.3"/>
  <!-- Front card (active session) -->
  <rect x="3" y="7" width="18" height="14" rx="2.5" stroke="#C5C5C5" stroke-width="1.5"/>
  <!-- Terminal chevron -->
  <polyline points="7 17 10.5 13.5 7 10" stroke="#C5C5C5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Cursor line -->
  <line x1="12.5" y1="17" x2="17" y2="17" stroke="#C5C5C5" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Claude spark -->
  <circle cx="24" cy="24" r="2.5" fill="#C5C5C5"/>
</svg>
