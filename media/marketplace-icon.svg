<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF8B5A"/>
      <stop offset="1" stop-color="#E07B39"/>
    </linearGradient>
  </defs>

  <!-- Stacked terminal cards (back card faded, front card bright) -->
  <rect x="28" y="14" width="84" height="62" rx="8" stroke="url(#accent)" stroke-width="3" opacity="0.3"/>
  <rect x="16" y="26" width="84" height="62" rx="8" stroke="url(#accent)" stroke-width="3.5" fill="none"/>

  <!-- Terminal prompt chevron -->
  <polyline points="32,68 48,55 32,42" stroke="url(#accent)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Cursor line -->
  <line x1="56" y1="68" x2="86" y2="68" stroke="url(#accent)" stroke-width="4.5" stroke-linecap="round"/>

  <!-- Claude spark (signature glowing dot) -->
  <circle cx="106" cy="106" r="14" fill="url(#accent)"/>
  <circle cx="106" cy="106" r="18" fill="none" stroke="#FF8B5A" stroke-width="2" opacity="0.4"/>
</svg>
