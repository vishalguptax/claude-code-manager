name: Release

on:
  push:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "LICENSE"
      - "docs/DEVELOPMENT.md"
      - "docs/PLAN.md"
      - ".dev/**"
    # Note: docs/releases/** and CHANGELOG.md are NOT ignored —
    # the release skill commits a release notes file which should
    # trigger the publish workflow.

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      # Expose secrets as job-level env so step-level `if:` can check existence.
      # Missing secrets resolve to empty strings, letting the conditional skip cleanly.
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
      OVSX_TOKEN: ${{ secrets.OVSX_TOKEN }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - run: npm ci

      - run: npm test

      - run: npm run build

      # Bump version based on commit message keywords
      # Use [major] or [minor] in commit message, otherwise defaults to patch
      - name: Bump version
        id: bump
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          if echo "$COMMIT_MSG" | grep -q "\[major\]"; then
            BUMP="major"
          elif echo "$COMMIT_MSG" | grep -q "\[minor\]"; then
            BUMP="minor"
          else
            BUMP="patch"
          fi
          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"
          npm version $BUMP --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Package
        run: npx @vscode/vsce package --no-dependencies -o dist/

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "release: v${{ steps.bump.outputs.version }}"
          git tag "${{ steps.bump.outputs.version }}"
          git push
          git push --tags

      # Publishes must not stop the GitHub Release below from being created,
      # but a failed publish must still fail the job (see the last step) —
      # v2.3.0 was silently rejected by the Marketplace behind a green run.
      - name: Publish to VS Code Marketplace
        id: vsce
        if: ${{ env.VSCE_PAT != '' }}
        continue-on-error: true
        run: npx @vscode/vsce publish --no-dependencies

      - name: Publish to Open VSX
        id: ovsx
        if: ${{ env.OVSX_TOKEN != '' }}
        continue-on-error: true
        run: npx ovsx publish dist/*.vsix -p "$OVSX_TOKEN"

      # Use curated release notes if present (docs/releases/v{version}.md),
      # otherwise fall back to GitHub's auto-generated notes.
      - name: Check for release notes file
        id: notes
        run: |
          NOTES_FILE="docs/releases/v${{ steps.bump.outputs.version }}.md"
          if [ -f "$NOTES_FILE" ]; then
            echo "file=$NOTES_FILE" >> "$GITHUB_OUTPUT"
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        if: always() && steps.bump.outputs.version != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.version }}
          name: v${{ steps.bump.outputs.version }}
          files: dist/*.vsix
          body_path: ${{ steps.notes.outputs.file }}
          generate_release_notes: ${{ steps.notes.outputs.exists == 'false' }}

      # Runs after the GitHub Release so the release always exists, but turns
      # any swallowed publish failure into a red run.
      - name: Fail if a marketplace publish failed
        if: ${{ steps.vsce.outcome == 'failure' || steps.ovsx.outcome == 'failure' }}
        run: |
          echo "::error::Publish failed — vsce: ${{ steps.vsce.outcome }}, ovsx: ${{ steps.ovsx.outcome }}"
          exit 1
