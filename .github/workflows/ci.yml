name: CI

on:
  pull_request:
    branches:
      - v2/main
      - v2/integration-target
      - main
  push:
    branches:
      - v2/main
      - v2/integration-target

jobs:
  verify:
    name: verify (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Biome check
        run: pnpm run check

      - name: TypeScript typecheck
        run: pnpm run typecheck

      - name: Unit tests with coverage
        run: pnpm test -- --coverage

      - name: Build
        run: pnpm run build

      - name: Bundle size budgets
        run: pnpm run size

      - name: Audit (runtime deps, high+)
        run: pnpm audit --prod --audit-level high

  integration:
    name: integration (@vscode/test-electron)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Compile integration suite
        run: pnpm run compile:integration

      - name: Build extension
        run: pnpm run build

      # The Extension Host boots a real (headless) VS Code window, which needs
      # a virtual framebuffer on the Linux runner. xvfb-run wraps the suite.
      - name: Run integration tests (xvfb)
        run: xvfb-run -a pnpm run test:integration
