name: Feature request
description: Suggest an improvement or new capability.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Claude Manager stays **local-first with zero telemetry**. Requests that
        require network calls, analytics, or account sign-in are out of scope.
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the workflow pain or gap. Focus on the "why", not the "how".
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like Claude Manager to do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you use today, or other approaches you weighed.
    validations:
      required: false
  - type: checkboxes
    id: constraints
    attributes:
      label: Constraints
      options:
        - label: This does not require any network call, telemetry, or remote account.
          required: true
